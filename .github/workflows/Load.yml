name: Copy SuperCancel Mod and Build APK

on:
  workflow_dispatch:

jobs:
  copy-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Decomp (your fork)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Clone SuperCancel Mod
      run: |
        cd android/app/jni
        git clone https://github.com/MegAmi24/Mania-Decomp-Mods.git
        cp -r Mania-Decomp-Mods/SuperCancel SuperCancel
        cd SuperCancel
        git clone https://github.com/RSDKModding/RSDKv5-GameAPI.git --recursive
        mv RSDKv5-GameAPI GameAPI
name: Build Sonic Mania Plus APK with SuperCancel (via Token)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout RSDKv5-Decompilation Fork
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Clone SuperCancel Mod (with token)
      run: |
        cd android/app/jni
        git clone https://MegAmi24:${{ secrets.GH_TOKEN }}@github.com/MegAmi24/Mania-Decomp-Mods.git
        cp -r Mania-Decomp-Mods/SuperCancel SuperCancel
        cd SuperCancel
        git clone https://github.com/RSDKModding/RSDKv5-GameAPI.git --recursive
        mv RSDKv5-GameAPI GameAPI

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: '25.2.9519653'

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sonic-Mania-Plus-SuperCancel-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: '25.2.9519653'

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sonic-Mania-Plus-SuperCancel-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
